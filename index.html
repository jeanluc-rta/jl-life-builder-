<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JL · Life Builder</title>
<style>
/* ── RESET & ROOT ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --ink:       #0F0F0F;
  --ink2:      #444;
  --ink3:      #888;
  --border:    #E5E5E5;
  --bg:        #F2F2F2;
  --white:     #FFFFFF;
  --red:       #C0392B;
  --red-lt:    #FDECEA;
  --blue:      #1A56A0;
  --blue-lt:   #E8F0FB;
  --green:     #1A7A34;
  --green-lt:  #E6F5EA;
  --amber:     #B85C00;
  --amber-lt:  #FEF3E2;
  --purple:    #6B21A8;
  --purple-lt: #F3E8FF;
  --slate:     #1C2B3A;
  --radius:    12px;
  --shadow:    0 1px 3px rgba(0,0,0,.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  max-width: 520px;
  margin: 0 auto;
}

/* ── HEADER ── */
.hdr {
  background: var(--slate);
  padding: 20px 20px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.hdr-name { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.hdr-sub  { color: #5a7a94; font-size: 12px; margin-top: 2px; }
.hdr-right { text-align: right; }
.hdr-date { color: #ccc; font-size: 13px; font-weight: 500; }
.hdr-week { color: #5a7a94; font-size: 11px; margin-top: 3px; }

/* ── TABS ── */
.tabs {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  position: sticky; top: 0; z-index: 50;
}
.tab {
  flex: 1; padding: 13px 4px;
  text-align: center; font-size: 12px; font-weight: 500;
  color: var(--ink3); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s; user-select: none;
  letter-spacing: .1px;
}
.tab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }

/* ── MAIN SCROLL AREA ── */
.main { padding: 16px; }

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--ink3); margin: 18px 0 8px;
}
.sec-label:first-child { margin-top: 0; }

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: opacity .2s;
}
.card.ticked { opacity: .45; }
.card-row {
  display: flex; align-items: flex-start;
  padding: 14px 16px; gap: 13px;
  cursor: pointer; user-select: none;
}
.card-row:active { background: #FAFAFA; }
.chk {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  margin-top: 1px; display: flex;
  align-items: center; justify-content: center;
  transition: all .18s; background: var(--white);
}
.chk.on { background: var(--green); border-color: var(--green); }
.card-body { flex: 1; min-width: 0; }
.card-tag {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px;
}
.card-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
.card.ticked .card-title { color: #aaa; text-decoration: line-through; }
.card-desc { font-size: 13px; color: var(--ink2); margin-top: 5px; line-height: 1.5; }
.card.ticked .card-desc { color: #bbb; }
.card-foot {
  border-top: 1px solid var(--border);
  padding: 11px 16px; background: var(--blue-lt);
}
.card-foot-label { font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.card-foot-body  { font-size: 13px; color: var(--ink2); line-height: 1.45; }

/* ── CALENDAR CARDS ── */
.cal-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.cal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cal-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
.cal-event {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.cal-event:last-child { border-bottom: none; }
.cal-event-time { font-size: 11px; color: var(--ink3); width: 72px; flex-shrink: 0; padding-top: 2px; font-variant-numeric: tabular-nums; }
.cal-event-name { font-size: 13px; font-weight: 500; line-height: 1.35; }
.cal-empty { font-size: 13px; color: var(--ink3); font-style: italic; }
.cal-loading { font-size: 13px; color: var(--ink3); display: flex; align-items: center; gap: 6px; }
.cal-error-note { font-size: 11px; color: var(--ink3); margin-top: 6px; }

/* ── HERO / WEEKEND ── */
.hero {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 20px; text-align: center;
  box-shadow: var(--shadow);
}
.hero-emoji { font-size: 48px; margin-bottom: 12px; }
.hero-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
.hero-body  { font-size: 14px; color: var(--ink2); line-height: 1.6; }

/* ── PHASE PILL ── */
.pill {
  display: inline-flex; align-items: center;
  padding: 5px 13px; border-radius: 14px;
  font-size: 11px; font-weight: 600; letter-spacing: .3px;
  margin-bottom: 14px;
}

/* ── DATE NAV ── */
.date-nav {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 16px;
}
.nav-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--white);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink2); user-select: none; box-shadow: var(--shadow);
}
.nav-btn:active { background: var(--bg); }
.date-c { text-align: center; }
.date-main { font-size: 16px; font-weight: 600; }
.date-sub  { font-size: 11px; color: var(--ink3); margin-top: 3px; }

/* ── WEEK REVIEW ── */
.streak-card {
  background: var(--slate); border-radius: 16px;
  padding: 22px 20px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 20px;
  box-shadow: var(--shadow);
}
.streak-num { font-size: 60px; font-weight: 800; color: #fff; line-height: 1; }
.streak-label { font-size: 15px; font-weight: 600; color: #fff; }
.streak-sub   { font-size: 12px; color: #5a7a94; margin-top: 3px; }
.streak-icon  { font-size: 28px; margin-top: 8px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 14px; box-shadow: var(--shadow);
}
.stat-num   { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-denom { font-size: 18px; font-weight: 400; color: #bbb; }
.stat-label { font-size: 12px; color: var(--ink3); line-height: 1.35; }
.mini-bar-bg   { background: var(--border); border-radius: 3px; height: 5px; margin-top: 10px; }
.mini-bar-fill { border-radius: 3px; height: 5px; transition: width .5s; }

/* 16-week arc */
.arc-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow);
}
.arc-title { font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.arc-pct   { font-size: 13px; font-weight: 700; color: var(--blue); }
.arc-weeks { display: flex; gap: 3px; flex-wrap: wrap; }
.arc-wk {
  width: 24px; height: 24px; border-radius: 5px;
  font-size: 9px; font-weight: 600; color: var(--ink3);
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); border: 1px solid var(--border);
  transition: all .2s;
}
.arc-wk.done    { background: var(--blue); color: #fff; border-color: var(--blue); }
.arc-wk.current { background: var(--amber); color: #fff; border-color: var(--amber); }

/* Momentum */
.momentum-card {
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 10px; border: 1px solid; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 12px;
}
.momentum-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.momentum-text { font-size: 13px; font-weight: 500; }

/* Consistency */
.consist-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow);
}
.consist-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.consist-label { font-size: 13px; font-weight: 500; color: var(--ink2); }
.consist-pct   { font-size: 13px; font-weight: 700; }

/* Intention */
.intention-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow);
}
.intention-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--ink3); margin-bottom: 8px; }
.intention-text  { font-size: 15px; color: var(--ink); line-height: 1.5; font-style: italic; }
.intention-empty { font-size: 13px; color: var(--ink3); font-style: italic; }
.intention-input {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  color: var(--ink); resize: none; margin-top: 8px;
  background: var(--bg);
}
.intention-input:focus { outline: none; border-color: var(--blue); background: var(--white); }
.btn-save {
  margin-top: 8px; padding: 9px 20px;
  background: var(--blue); color: #fff;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-save:active { opacity: .8; }
.btn-edit {
  font-size: 12px; color: var(--blue);
  background: none; border: none; cursor: pointer;
  padding: 0; font-weight: 500;
}

/* Day grid */
.day-grid {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 10px; box-shadow: var(--shadow);
}
.day-grid-title { font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 10px; }
.day-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.day-row:last-child { border-bottom: none; }
.day-name { font-size: 13px; font-weight: 500; width: 36px; color: var(--ink2); flex-shrink: 0; }
.day-dots { display: flex; gap: 7px; flex: 1; }
.dot {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
}
.dot-s { background: var(--blue); }
.dot-b { background: var(--red); }
.dot-e { background: var(--green); }
.dot-x { background: var(--border); }
.dot-legend { display: flex; gap: 14px; margin-top: 11px; flex-wrap: wrap; }
.dot-leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink3); }
.dot-leg-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Milestones */
.milestone {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 8px; display: flex; align-items: flex-start;
  gap: 12px; box-shadow: var(--shadow);
}
.milestone.locked { opacity: .4; }
.milestone-icon { font-size: 22px; flex-shrink: 0; }
.milestone-title { font-size: 14px; font-weight: 600; }
.milestone-sub   { font-size: 12px; color: var(--ink3); margin-top: 2px; }
.milestone-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; padding: 2px 8px; border-radius: 10px;
  margin-top: 5px; display: inline-block;
}

/* ── LAUNCH PROJECT ── */
.launch-progress {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.launch-progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
.launch-progress-title  { font-size: 14px; font-weight: 600; }
.launch-progress-pct    { font-size: 14px; font-weight: 700; color: var(--red); }
.prog-bar-bg   { background: var(--border); border-radius: 4px; height: 8px; }
.prog-bar-fill { background: var(--red); border-radius: 4px; height: 8px; transition: width .5s; }
.prog-counts   { font-size: 12px; color: var(--ink3); margin-top: 6px; }

.launch-cat { margin-bottom: 18px; }
.launch-cat-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--ink3); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.launch-task {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 6px;
  display: flex; align-items: flex-start; gap: 10px; box-shadow: var(--shadow);
}
.launch-task-body { flex: 1; min-width: 0; }
.launch-task-title { font-size: 14px; font-weight: 500; line-height: 1.3; }
.launch-task-notes { font-size: 12px; color: var(--ink3); margin-top: 3px; line-height: 1.4; }
.launch-task-date  { font-size: 11px; color: var(--ink3); margin-top: 4px; }
.status-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; padding: 3px 8px; border-radius: 8px;
  flex-shrink: 0; margin-top: 1px; white-space: nowrap;
}
.status-todo     { background: var(--bg); color: var(--ink3); border: 1px solid var(--border); }
.status-progress { background: var(--amber-lt); color: var(--amber); border: 1px solid #F5CBA7; }
.status-done     { background: var(--green-lt); color: var(--green); border: 1px solid #A9DFBF; }

/* ── SETUP PROMPT ── */
.setup-card {
  background: var(--amber-lt); border: 1px solid #F5CBA7;
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
}
.setup-title { font-size: 14px; font-weight: 700; color: var(--amber); margin-bottom: 6px; }
.setup-body  { font-size: 13px; color: var(--ink2); line-height: 1.5; }
.setup-body code {
  background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 4px;
  font-family: 'SF Mono', Menlo, monospace; font-size: 12px;
}
.setup-body a { color: var(--blue); }

/* ── WEEK NAV ── */
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.week-nav-btn {
  padding: 8px 16px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--white);
  font-size: 13px; cursor: pointer; color: var(--ink2); box-shadow: var(--shadow);
}

/* ── MISC ── */
.reset-wrap { text-align: center; padding: 10px 0 28px; }
.reset-wrap button { background: none; border: none; font-size: 12px; color: #ccc; cursor: pointer; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE: MAC ── */
@media (min-width: 521px) {
  body { background: #E8E8E8; }
  .hdr { border-radius: 0; }
}
</style>
</head>

//  UTILS
// ════════════════════════════════════════════════════════════════
function todayD() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function isToday(d) { return d.getTime() === todayD().getTime(); }
function inPlan(d) {
  const end = new Date(CFG.PLAN_START.getTime() + 16*7*86400000);
  return d >= CFG.PLAN_START && d < end;
}
function weekNum(d) {
  const days = Math.floor((d - CFG.PLAN_START) / 86400000);
  if (days < 0) return 0;
  return Math.min(Math.max(Math.floor(days / 7) + 1, 1), 16);
}
function fmt(d) { return `${DAY_FULL[d.getDay()]} ${d.getDate()} ${MON_S[d.getMonth()]}`; }
function fmtShort(d) { return `${d.getDate()} ${MON_S[d.getMonth()]}`; }
function shiftDay(n) { renderLock = false; viewDate = new Date(viewDate.getTime() + n*86400000); render(); }
function shiftWeek(n) { renderLock = false; viewDate = new Date(viewDate.getTime() + n*7*86400000); render(); }

function getWeekdays(d) {
  const dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  mon.setHours(0,0,0,0);
  return Array.from({length:5}, (_,i) => { const dd = new Date(mon); dd.setDate(mon.getDate()+i); return dd; });
}

//  LOCAL STORAGE — daily ticks
// ════════════════════════════════════════════════════════════════
function lsKey(d) { return `jl3_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`; }
function loadTicks(d) { try { return JSON.parse(localStorage.getItem(lsKey(d))) || {}; } catch(e) { return {}; } }
function saveTicks(d, obj) { try { localStorage.setItem(lsKey(d), JSON.stringify(obj)); } catch(e) {} }

function toggleTick(field) {
  const t = loadTicks(viewDate);
  t[field] = !t[field];
  saveTicks(viewDate, t);
  render();
}

function resetDay() {
  if (confirm('Reset all ticks for this day?')) { localStorage.removeItem(lsKey(viewDate)); render(); }
}

// ════════════════════════════════════════════════════════════════
//  STREAK
// ════════════════════════════════════════════════════════════════
function calcStreak() {
  let streak = 0, d = new Date(todayD());
  if (!loadTicks(d).ex) d.setDate(d.getDate()-1);
  for (let i = 0; i < 400; i++) {
    const dow = d.getDay();
    if (dow===0||dow===6) { d.setDate(d.getDate()-1); continue; }
    if (!loadTicks(d).ex) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ════════════════════════════════════════════════════════════════
//  CONSISTENCY (study + biz across whole plan so far)
// ════════════════════════════════════════════════════════════════
function calcConsistency() {
  let studyDone=0, bizDone=0, total=0;
  let d = new Date(CFG.PLAN_START);
  const now = todayD();
  while (d <= now && inPlan(d)) {
    const dow = d.getDay();
    if (dow!==0 && dow!==6) {
      total++;
      const t = loadTicks(d);
      if (t.study) studyDone++;
      if (t.biz)   bizDone++;
    }
    d.setDate(d.getDate()+1);
  }
  return { study: total ? Math.round(studyDone/total*100) : 0,
           biz:   total ? Math.round(bizDone/total*100) : 0,
           total };
}

// ════════════════════════════════════════════════════════════════
//  MOMENTUM (last 3 weekdays)
// ════════════════════════════════════════════════════════════════
function calcMomentum() {
  if (!inPlan(todayD()) && todayD() < CFG.PLAN_START) {
    return { color:'var(--blue)', bg:'var(--blue-lt)', border:'#BBDEFB', label:'Plan starts 18 May 2026. Momentum tracking begins then.' };
  }
  let days=[], d=new Date(todayD()), safety=0;
  while (days.length<3 && safety<60) {
    safety++;
    const dow=d.getDay();
    if (dow!==0 && dow!==6) {
      if (inPlan(d)) {
        const t=loadTicks(d);
        days.push((t.study?1:0)+(t.biz?1:0)+(t.ex?1:0));
      } else if (d < CFG.PLAN_START) {
        days.push(0);
      }
    }
    d.setDate(d.getDate()-1);
  }
  if (days.length===0) return { color:'var(--blue)', bg:'var(--blue-lt)', border:'#BBDEFB', label:'No data yet — tick off your first day to start tracking momentum.' };
  const avg = days.reduce((a,b)=>a+b,0)/Math.max(days.length*3,1);
  if (avg>=.7) return { color:'var(--green)', bg:'var(--green-lt)', border:'#A9DFBF', label:'Strong momentum — you\'re in the groove. Keep it going.' };
  if (avg>=.4) return { color:'var(--amber)', bg:'var(--amber-lt)', border:'#F5CBA7', label:'Momentum softening. One good day resets the pattern.' };
  return { color:'var(--red)', bg:'var(--red-lt)', border:'#F1948A', label:'Momentum low. Start with exercise — it anchors everything else.' };
}

function fetchWithTimeout(url, ms=5000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

async function fetchSheet(tab) {
  if (!IS_CONFIGURED) return null;
  const cacheKey = `sheet_${tab}`;
  if (SESSION[cacheKey]) return SESSION[cacheKey];
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/${encodeURIComponent(tab)}?key=${CFG.SHEETS_API_KEY}`;
    const r = await fetchWithTimeout(url);
    if (!r.ok) return null;
    const data = await r.json();
    SESSION[cacheKey] = data.values || [];
    return SESSION[cacheKey];
  } catch(e) { return null; }
}

// Parse Schedule tab: cols = Week, Course, Focus, Biz, Phase, PhaseTag, PhaseBg, PhaseFg
async function getScheduleWeek(wn) {
  const safeWn = Math.min(Math.max(wn || 1, 1), 16);
  const rows = await fetchSheet('Schedule');
  if (!rows) return FALLBACK_SCHEDULE[safeWn] || FALLBACK_SCHEDULE[1];
  const row = rows.find(r => parseInt(r[0]) === safeWn);
  if (!row) return FALLBACK_SCHEDULE[safeWn] || FALLBACK_SCHEDULE[1];
  return { course:row[1]||'', focus:row[2]||'', biz:row[3]||'', phase:row[4]||'', phaseTag:row[5]||'', phaseBg:row[6]||'#D6E4F0', phaseFg:row[7]||'#1B4F72' };
}

// Parse WeeklyIntention tab: cols = Week, Intention
async function getIntention(wn) {

async function getLaunchTasks() {
  const rows = await fetchSheet('LaunchProject');
  if (!rows || rows.length < 2) return FALLBACK_LAUNCH;
  const data = rows.slice(1); // skip header
  const cats = {};
  data.forEach(r => {

    cats[cat].push({ title:r[1]||'', status:r[2]||'To Do', date:r[3]||'', notes:r[4]||'' });

  return Object.entries(cats).map(([cat,tasks]) => ({cat,tasks}));

async function getMilestones() {
  const rows = await fetchSheet('Milestones');
  if (!rows || rows.length < 2) return FALLBACK_MILESTONES;

// Parse AppleCalendar tab — written by iOS Shortcut
async function getAppleCalendar() {
  const rows = await fetchSheet('AppleCalendar');
  if (!rows || rows.length < 2) return null;
  // Find today's row: col A = date YYYY-MM-DD, col B = events text
  const todayStr = todayD().toISOString().split('T')[0];
  const row = rows.find(r => r[0] === todayStr);
  return row ? row[1] : null;
}

// ════════════════════════════════════════════════════════════════
//  GOOGLE CALENDAR
// ════════════════════════════════════════════════════════════════
async function fetchGCal() {
  if (!IS_CONFIGURED || !CFG.GCAL_API_KEY || !CFG.GCAL_CALENDAR_ID) return null;
  try {
    const d = viewDate;
    const tMin = new Date(d); tMin.setHours(0,0,0,0);
    const tMax = new Date(d); tMax.setHours(23,59,59,999);
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CFG.GCAL_CALENDAR_ID)}/events?key=${CFG.GCAL_API_KEY}&timeMin=${tMin.toISOString()}&timeMax=${tMax.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=10`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    return (data.items||[]).map(ev => {
      const start = ev.start.dateTime ? new Date(ev.start.dateTime) : null;
      const time = start ? start.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : 'All day';
      return { time, title: ev.summary||'(no title)' };
    });
  } catch(e) { return null; }
}

let renderLock = false;
let pendingTab = null;

function switchTab(t) {
  activeTab = t;
  ['today','week','launch'].forEach(id => document.getElementById('tab-'+id).classList.toggle('on', id===t));
  render();
}

function updateHeader() {
  try {
    const t = todayD();
    document.getElementById('hdrDate').textContent = fmt(t);
    const wn = weekNum(t);
    document.getElementById('hdrWeek').textContent = inPlan(t) ? `Week ${wn} of 16` : '';
  } catch(e) {}
}

async function render() {
  if (renderLock) { pendingTab = activeTab; return; }
  renderLock = true;
  updateHeader();
  const main = document.getElementById('main');
  main.style.opacity = '0.5';
  try {
    let html = '';
    if (activeTab==='today') html = await renderToday();
    else if (activeTab==='week') html = await renderWeek();
    else html = await renderLaunch();
    main.innerHTML = html;
  } catch(e) {
    main.innerHTML = `<div style="padding:24px;text-align:center;color:#888;font-size:14px;">
      Something went wrong loading this view.<br><br>
      <button onclick="renderLock=false;render()" style="padding:8px 20px;background:#1C2B3A;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;">Retry</button>
    </div>`;
  } finally {
    main.style.opacity = '1';
    renderLock = false;
    if (pendingTab && pendingTab !== activeTab) {
      const next = pendingTab;
      pendingTab = null;
      activeTab = next;
      ['today','week','launch'].forEach(id => document.getElementById('tab-'+id).classList.toggle('on', id===next));
      render();
    } else {
      pendingTab = null;
    }
  }
}

        inner.outerHTML = `<div class="cal-empty">No events today.</div>`;
      } else {
        inner.outerHTML = events.map(ev =>
          `<div class="cal-event"><div class="cal-event-time">${ev.time}</div><div class="cal-event-name">${ev.title}</div></div>`
        ).join('');
      }
    }
  }

  // Personal/Family calendar
  const acalBlock = document.getElementById('acal-block');
  if (acalBlock) {
    if (!IS_CONFIGURED) {
      acalBlock.querySelector('.cal-loading').outerHTML = `<div class="cal-empty">Set up the iOS Shortcut to push Apple Calendar events here.</div><div class="cal-error-note">See the Wiring Guide for setup instructions.</div>`;
    } else {
      const text = await getAppleCalendar();
      const inner = acalBlock.querySelector('.cal-loading');
      if (!inner) return;
      if (!text) {
        inner.outerHTML = `<div class="cal-empty">No events pushed today. Run the morning iOS Shortcut to populate this.</div>`;
      } else {
        // text is a pre-formatted string: "HH:MM Title\nHH:MM Title"
        const lines = text.split('\n').filter(Boolean);
        inner.outerHTML = lines.map(line => {
          const parts = line.match(/^(\d{2}:\d{2})\s+(.+)$/);
          if (parts) return `<div class="cal-event"><div class="cal-event-time">${parts[1]}</div><div class="cal-event-name">${parts[2]}</div></div>`;
          return `<div class="cal-event"><div class="cal-event-time"></div><div class="cal-event-name">${line}</div></div>`;
        }).join('');
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  TAB: WEEK REVIEW
// ════════════════════════════════════════════════════════════════
async function renderWeek() {
  const weekdays = getWeekdays(viewDate);
  const wn = weekNum(viewDate);
  const wd = await getScheduleWeek(wn);
  const streak = calcStreak();
  const consist = calcConsistency();
  const momentum = calcMomentum();
  const milestones = await getMilestones();
  const intent = await getIntention(wn);

  const past = weekdays.filter(d => d <= todayD() && inPlan(d));
  let studyW=0, bizW=0, exW=0;
  past.forEach(d => { const t=loadTicks(d); if(t.study)studyW++; if(t.biz)bizW++; if(t.ex)exW++; });
  const totalW = past.length;

  const mon=weekdays[0], fri=weekdays[4];
  const rangeLabel = `${fmtShort(mon)} – ${fmtShort(fri)}`;
  const wkPlanTotal = weekNum(todayD());
  const arcPct = Math.round((wkPlanTotal-1)/16*100);

  let h = `<div style="margin-bottom:14px;">
    <div style="font-size:16px;font-weight:700;">${rangeLabel}</div>
    <div style="font-size:12px;color:var(--ink3);margin-top:2px;">${inPlan(viewDate)?`Week ${wn} of 16 · ${wd.phase}`:'Outside plan window'}</div>
  </div>`;

  // Exercise streak
  const streakIcon = streak>=15?'🔥🔥':streak>=10?'🔥':streak>=5?'⚡':streak>=1?'✅':'—';
  h += `<div class="streak-card">
    <div class="streak-num">${streak}</div>
    <div>
      <div class="streak-label">Exercise streak</div>
      <div class="streak-sub">consecutive weekdays</div>
      <div class="streak-icon">${streakIcon}</div>
    </div>
  </div>`;

  // Momentum
  h += `<div class="momentum-card" style="background:${momentum.bg};border-color:${momentum.border};">
    <div class="momentum-dot" style="background:${momentum.color};"></div>
    <div class="momentum-text" style="color:${momentum.color};">${momentum.label}</div>
  </div>`;

  // This week stats
  h += `<div class="stat-grid">
    <div class="stat-card">
      <div class="stat-num" style="color:var(--blue);">${studyW}<span class="stat-denom">/${totalW||5}</span></div>
      <div class="stat-label">Study days<br>this week</div>
      <div class="mini-bar-bg"><div class="mini-bar-fill" style="background:var(--blue);width:${totalW?Math.round(studyW/totalW*100):0}%;"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--red);">${bizW}<span class="stat-denom">/${totalW||5}</span></div>
      <div class="stat-label">Business days<br>this week</div>
      <div class="mini-bar-bg"><div class="mini-bar-fill" style="background:var(--red);width:${totalW?Math.round(bizW/totalW*100):0}%;"></div></div>
    </div>
  </div>`;

  // 16-week progress arc
  h += `<div class="arc-card">
    <div class="arc-title"><span>16-Week Progress Arc</span><span class="arc-pct">Week ${wkPlanTotal} · ${arcPct}%</span></div>
    <div class="arc-weeks">`;
  for (let i=1; i<=16; i++) {
    const cls = i < wkPlanTotal ? 'done' : i===wkPlanTotal ? 'current' : '';
    h += `<div class="arc-wk ${cls}">${i}</div>`;
  }
  h += `</div></div>`;

  // Overall consistency
  h += `<div class="consist-card">
    <div style="font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:10px;">Plan-wide consistency</div>
    <div class="consist-row">
      <div class="consist-label">Study</div>
      <div class="consist-pct" style="color:var(--blue);">${consist.study}%</div>
    </div>
    <div class="mini-bar-bg" style="margin-bottom:10px;"><div class="mini-bar-fill" style="background:var(--blue);width:${consist.study}%;"></div></div>
    <div class="consist-row">
      <div class="consist-label">Business build</div>
      <div class="consist-pct" style="color:var(--red);">${consist.biz}%</div>
    </div>
    <div class="mini-bar-bg"><div class="mini-bar-fill" style="background:var(--red);width:${consist.biz}%;"></div></div>
    <div style="font-size:11px;color:var(--ink3);margin-top:8px;">Based on ${consist.total} weekdays tracked since plan start</div>
  </div>`;

  // Weekly intention
  h += `<div class="intention-card">
    <div class="intention-label">Week ${wn} intention ${IS_CONFIGURED?'<button class="btn-edit" onclick="toggleIntentionEdit()">edit</button>':''}
    </div>`;
  if (editingIntention) {
    h += `<textarea class="intention-input" id="intentionInput" rows="3" placeholder="Write your intention for this week…">${intent}</textarea>
      <button class="btn-save" onclick="submitIntention(${wn})">Save intention</button>`;
  } else {
    h += intent
      ? `<div class="intention-text">"${intent}"</div>`
      : `<div class="intention-empty">No intention set. ${IS_CONFIGURED?'Tap edit to add one.':'Connect Google Sheets to enable this.'}</div>`;
  }
  h += `</div>`;

  // Day breakdown
  h += `<div class="day-grid"><div class="day-grid-title">This week — day by day</div>`;
  weekdays.forEach(d => {
    const t = loadTicks(d);
    const isPast = d <= todayD();
    const inP = inPlan(d);
    h += `<div class="day-row">
      <div class="day-name">${DAY_SHORT[d.getDay()]}</div>
      <div class="day-dots">`;
    if (!inP||!isPast) {
      h += `<span style="font-size:12px;color:#ccc;">${!inP?'—':'upcoming'}</span>`;
    } else {
      h += `<div class="dot ${t.study?'dot-s':'dot-x'}">S</div>`;
      h += `<div class="dot ${t.biz?'dot-b':'dot-x'}">B</div>`;
      h += `<div class="dot ${t.ex?'dot-e':'dot-x'}">E</div>`;
    }
    h += `</div></div>`;
  });
  h += `<div class="dot-legend">
    <div class="dot-leg"><div class="dot-leg-dot" style="background:var(--blue);"></div>Study</div>
    <div class="dot-leg"><div class="dot-leg-dot" style="background:var(--red);"></div>Business</div>
    <div class="dot-leg"><div class="dot-leg-dot" style="background:var(--green);"></div>Exercise</div>
    <div class="dot-leg"><div class="dot-leg-dot" style="background:var(--border);"></div>Missed / upcoming</div>
  </div></div>`;

  // Milestones
  h += `<div class="sec-label">Milestones</div>`;
  milestones.forEach(m => {
    const unlocked = wkPlanTotal >= m.week;
    h += `<div class="milestone ${unlocked?'':'locked'}">
      <div class="milestone-icon">${m.icon}</div>
      <div>
        <div class="milestone-title">${m.title}</div>
        <div class="milestone-sub">${m.desc}</div>
        <span class="milestone-badge" style="${unlocked?'background:var(--green-lt);color:var(--green);border:1px solid #A9DFBF;':'background:var(--bg);color:var(--ink3);border:1px solid var(--border);'}">
          ${unlocked?'✓ Unlocked':`Week ${m.week}`}
        </span>
      </div>
    </div>`;
  });

  // Week nav
  h += `<div class="week-nav" style="margin-top:14px;">
    <button class="week-nav-btn" onclick="shiftWeek(-1)">‹ Prev week</button>
    <div style="font-size:12px;color:var(--ink3);">Navigate</div>
    <button class="week-nav-btn" onclick="shiftWeek(1)">Next week ›</button>
  </div><div style="height:28px;"></div>`;

  return h;
}

function toggleIntentionEdit() {
  editingIntention = !editingIntention;
  render();
}

async function submitIntention(wn) {
  const input = document.getElementById('intentionInput');
  if (!input) return;
  const text = input.value.trim();
  const ok = await saveIntention(wn, text);
  editingIntention = false;
  if (!ok) alert('Could not save — check your Apps Script URL in the config. You can also update the WeeklyIntention tab in your Google Sheet directly.');
  render();
}

// ════════════════════════════════════════════════════════════════
//  TAB: LAUNCH PROJECT
// ════════════════════════════════════════════════════════════════
async function renderLaunch() {
  const tasks = await getLaunchTasks();
  let total=0, done=0, inprog=0;
  tasks.forEach(cat => cat.tasks.forEach(t => {
    total++;
    if (t.status==='Done') done++;
    if (t.status==='In Progress') inprog++;
  }));
  const pct = total ? Math.round(done/total*100) : 0;

  let h = setupBanner();

  h += `<div style="font-size:17px;font-weight:700;margin-bottom:4px;">Red Thread Launch</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px;">Pre-launch infrastructure tracker</div>`;

  // Progress
  h += `<div class="launch-progress">
    <div class="launch-progress-header">
      <div class="launch-progress-title">Launch readiness</div>
      <div class="launch-progress-pct">${pct}%</div>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%;"></div></div>
    <div class="prog-counts">${done} of ${total} tasks complete · ${inprog} in progress</div>
  </div>`;

  if (!IS_CONFIGURED) {
    h += `<div class="setup-card">
      <div class="setup-title">📋 Manage tasks from Google Sheets</div>
      <div class="setup-body">Once configured, edit the <strong>LaunchProject</strong> tab in your Sheet to update task status, add new tasks, or change target dates. Changes appear here immediately on refresh. The fallback task list below is pre-loaded from the 90-day launch plan.</div>
    </div>`;
  }

  // Category sections
  const statusMap = { 'Done':'status-done', 'In Progress':'status-progress', 'To Do':'status-todo' };

  tasks.forEach(cat => {
    const catDone = cat.tasks.filter(t=>t.status==='Done').length;
    h += `<div class="launch-cat">
      <div class="launch-cat-title">
        ${cat.cat}
        <span style="font-weight:400;color:var(--ink3);">${catDone}/${cat.tasks.length}</span>
      </div>`;
    cat.tasks.forEach(t => {
      const cls = statusMap[t.status] || 'status-todo';
      h += `<div class="launch-task">
        <div class="launch-task-body">
          <div class="launch-task-title" style="${t.status==='Done'?'text-decoration:line-through;color:#aaa;':''}">${t.title}</div>
          ${t.notes?`<div class="launch-task-notes">${t.notes}</div>`:''}
          ${t.date?`<div class="launch-task-date">Target: ${t.date}</div>`:''}
        </div>
        <span class="status-badge ${cls}">${t.status}</span>
      </div>`;
    });
    h += `</div>`;
  });

  h += `<div style="height:28px;"></div>`;
  return h;
}

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
render();
</script>
